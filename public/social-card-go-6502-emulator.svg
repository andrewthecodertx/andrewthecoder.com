<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  
  <!-- Decorative grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2d2d2d"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3d3d3d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#0f0f0f"/>
  
  <!-- Project title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4ade80">
    Go-6502 Emulator
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="24" fill="#9ca3af">
    Cycle-Accurate MOS6502/WDC65C02 Emulator
  </text>
  
  <!-- Main visual element - CPU chips and memory -->
  <g transform="translate(150, 200)">
    <!-- CPU die -->
    <rect x="0" y="100" width="200" height="180" rx="8" fill="#2d2d2d" stroke="#4ade80" stroke-width="3"/>
    <text x="80" y="190" font-family="monospace" font-size="32" fill="#4ade80">CPU</text>
    
    <!-- MOS6502 box -->
    <rect x="30" y="130" width="140" height="40" rx="3" fill="#1a1a1a" stroke="#4ade80" stroke-width="1"/>
    <text x="50" y="155" font-family="monospace" font-size="18" fill="#6e7681">MOS6502</text>
    
    <!-- WDC65C02 box -->
    <rect x="30" y="200" width="140" height="40" rx="3" fill="#1a1a1a" stroke="#60a5fa" stroke-width="1"/>
    <text x="50" y="225" font-family="monospace" font-size="18" fill="#6e7681">WDC65C02</text>
    
    <!-- Bus interface -->
    <rect x="250" y="150" width="40" height="80" rx="4" fill="#3d3d3d"/>
    <text x="255" y="185" font-family="monospace" font-size="14" fill="#9ca3af">Bus</text>
    <line x1="200" y1="190" x2="250" y2="190" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- RAM banks -->
    <rect x="350" y="130" width="60" height="120" rx="4" fill="#4ade80" fill-opacity="0.2"/>
    <text x="360" y="185" font-family="monospace" font-size="14" fill="#4ade80">RAM</text>
    <text x="360" y="205" font-family="monospace" font-size="14" fill="#4ade80">32KB</text>
    
    <!-- ROM -->
    <rect x="450" y="130" width="60" height="120" rx="4" fill="#60a5fa" fill-opacity="0.2"/>
    <text x="460" y="185" font-family="monospace" font-size="14" fill="#60a5fa">ROM</text>
    <text x="460" y="205" font-family="monospace" font-size="14" fill="#60a5fa">2KB</text>
  </g>
  
  <!--Instruction set badges -->
  <g transform="translate(60, 480)">
    <rect x="0" y="0" width="250" height="40" rx="4" fill="#2d2d2d"/>
    <rect x="20" y="10" width="30" height="20" rx="2" fill="#4ade80"/>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af">56 instructions</text>
    
    <rect x="280" y="0" width="250" height="40" rx="4" fill="#2d2d2d"/>
    <rect x="300" y="10" width="30" height="20" rx="2" fill="#60a5fa"/>
    <text x="340" y="25" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af">70 instructions</text>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f0f0f"/>
  
  <!-- GitHub badge -->
  <g transform="translate(60, 605)">
    <rect width="160" height="20" rx="3" fill="#2d2d2d"/>
    <text x="5" y="14" font-family="Arial, sans-serif" font-size="12" fill="#6e7681">
      github.com/andrewthecodertx
    </text>
  </g>
</svg>
