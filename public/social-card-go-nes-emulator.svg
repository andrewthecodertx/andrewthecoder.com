<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  
  <!-- Decorative grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2d2d2d"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3d3d3d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#0f0f0f"/>
  
  <!-- Project title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4ade80">
    Go NES Emulator
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="24" fill="#9ca3af">
    Nintendo Entertainment System Emulator with SDL2 &amp; WASM
  </text>
  
  <!-- Main visual element - NES console + NES games -->
  <g transform="translate(60, 180)">
    <!-- Top of NES console top-down view -->
    <path d="M 300 50 L 500 50 L 480 250 L 320 250 Z" fill="#2d2d2d" stroke="#4ade80" stroke-width="2"/>
    <text x="380" y="50" font-family="Arial, sans-serif" font-size="24" fill="#4ade80" text-anchor="middle">NES</text>
    
    <!-- Cartridge slot -->
    <rect x="350" y="60" width="200" height="30" rx="3" fill="#1a1a1a" stroke="#6e7681" stroke-width="1"/>
    <text x="450" y="80" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Cartridge Slot</text>
    
    <!-- Game cartridges -->
    <rect x="150" y="120" width="50" height="90" rx="4" fill="#60a5fa"/>
    <text x="175" y="155" font-family="Arial, sans-serif" font-size="10" fill="#0f0f0f" text-anchor="middle" transform="rotate(-90 175 155)">Mario</text>
    
    <rect x="220" y="120" width="50" height="90" rx="4" fill="#f472b6"/>
    <text x="245" y="155" font-family="Arial, sans-serif" font-size="10" fill="#0f0f0f" text-anchor="middle" transform="rotate(-90 245 155)">Zelda</text>
    
    <rect x="290" y="120" width="50" height="90" rx="4" fill="#f97316"/>
    <text x="315" y="155" font-family="Arial, sans-serif" font-size="10" fill="#0f0f0f" text-anchor="middle" transform="rotate(-90 315 155)">Mega Man</text>
    
    <!-- controllers -->
    <rect x="420" y="280" width="90" height="80" rx="8" fill="#0f0f0f" stroke="#4ade80" stroke-width="2"/>
    <circle cx="450" cy="310" r="10" fill="#4ade80"/>
    <circle cx="470" cy="330" r="10" fill="#f472b6"/>
    <text x="435" y="310" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">A</text>
    <text x="455" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">B</text>
    <text x="435" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">Start</text>
    <text x="455" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">Select</text>
    
    <rect x="540" y="280" width="90" height="80" rx="8" fill="#0f0f0f" stroke="#4ade80" stroke-width="2"/>
    <circle cx="570" cy="310" r="10" fill="#4ade80"/>
    <circle cx="590" cy="330" r="10" fill="#f472b6"/>
    <text x="555" y="310" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">A</text>
    <text x="575" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">B</text>
    <text x="555" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">Start</text>
    <text x="575" y="330" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">Select</text>
  </g>
  
  <!-- Mapper support badges -->
  <g transform="translate(60, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" fill="#4ade80">Mapper Support:</text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#4ade80"/>
      <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Mapper 0 (NROM)</text>
    </g>
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#60a5fa"/>
      <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Mapper 1 (MMC1)</text>
    </g>
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#f472b6"/>
      <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Mapper 2 (UxROM)</text>
    </g>
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#f97316"/>
      <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Mapper 3 (CNROM)</text>
    </g>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f0f0f"/>
  
  <!-- GitHub badge -->
  <g transform="translate(60, 605)">
    <rect width="160" height="20" rx="3" fill="#2d2d2d"/>
    <text x="5" y="14" font-family="Arial, sans-serif" font-size="12" fill="#6e7681">
      github.com/andrewthecodertx
    </text>
  </g>
</svg>
