<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  
  <!-- Decorative grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2d2d2d"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3d3d3d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#0f0f0f"/>
  
  <!-- Project title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4ade80">
    Rust Neural Network
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="24" fill="#9ca3af">
    Feedforward Neural Network with Backpropagation
  </text>
  
  <!-- Main visual element - neural network diagram -->
  <g transform="translate(60, 180)">
    <!-- Input layer nodes -->
    <circle cx="50" cy="200" r="25" fill="#4ade80" fill-opacity="0.8"/>
    <circle cx="50" cy="280" r="25" fill="#4ade80" fill-opacity="0.8"/>
    <circle cx="50" cy="360" r="25" fill="#4ade80" fill-opacity="0.8"/>
    <text x="15" y="205" font-family="monospace" font-size="20" fill="#0f0f0f">I1</text>
    <text x="15" y="285" font-family="monospace" font-size="20" fill="#0f0f0f">I2</text>
    <text x="15" y="365" font-family="monospace" font-size="20" fill="#0f0f0f">I3</text>
    
    <!-- Hidden layer nodes -->
    <circle cx="300" cy="180" r="30" fill="#60a5fa" fill-opacity="0.8"/>
    <circle cx="300" cy="280" r="30" fill="#60a5fa" fill-opacity="0.8"/>
    <circle cx="300" cy="380" r="30" fill="#60a5fa" fill-opacity="0.8"/>
    <text x="285" y="185" font-family="monospace" font-size="20" fill="#0f0f0f">H1</text>
    <text x="285" y="285" font-family="monospace" font-size="20" fill="#0f0f0f">H2</text>
    <text x="285" y="385" font-family="monospace" font-size="20" fill="#0f0f0f">H3</text>
    
    <!-- Output layer nodes -->
    <circle cx="550" cy="280" r="35" fill="#f472b6" fill-opacity="0.8"/>
    <text x="525" y="285" font-family="monospace" font-size="20" fill="#0f0f0f">O</text>
    
    <!-- Connections -->
    <line x1="75" y1="200" x2="270" y2="180" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="200" x2="270" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="200" x2="270" y2="380" stroke="#9ca3af" stroke-width="2"/>
    
    <line x1="75" y1="280" x2="270" y2="180" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="280" x2="270" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="280" x2="270" y2="380" stroke="#9ca3af" stroke-width="2"/>
    
    <line x1="75" y1="360" x2="270" y2="180" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="360" x2="270" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <line x1="75" y1="360" x2="270" y2="380" stroke="#9ca3af" stroke-width="2"/>
    
    <line x1="330" y1="180" x2="515" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <line x1="330" y1="280" x2="515" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <line x1="330" y1="380" x2="515" y2="280" stroke="#9ca3af" stroke-width="2"/>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f0f0f"/>
  
  <!-- GitHub badge -->
  <g transform="translate(60, 605)">
    <rect width="160" height="20" rx="3" fill="#2d2d2d"/>
    <text x="5" y="14" font-family="Arial, sans-serif" font-size="12" fill="#6e7681">
      github.com/andrewthecodertx
    </text>
  </g>
</svg>
