<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>
  
  <!-- Decorative grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2d2d2d"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3d3d3d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#0f0f0f"/>
  
  <!-- Project title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4ade80">
    OCaml Mandelbrot Set
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="24" fill="#9ca3af">
    Interactive Mandelbrot Explorer with OCaml Graphics
  </text>
  
  <!-- Main visual element - Mandelbrot fractal visualization -->
  <g transform="translate(200, 200)">
    <!-- Complex plane grid -->
    <rect x="0" y="0" width="600" height="350" fill="#1a1a1a" stroke="#4ade80" stroke-width="2"/>
    
    <!-- Draw fractal pattern representation -->
    <path d="M 100 175 C 120 50, 140 50, 160 175 C 180 300, 200 300, 220 175 C 240 50, 260 50, 280 175 C 300 300, 320 300, 340 175 C 360 50, 380 50, 400 175 C 420 300, 440 300, 460 175 C 480 50, 500 50, 520 175" 
          stroke="#4ade80" stroke-width="3" fill="none" opacity="0.7"/>
    
    <!-- Zoom area -->
    <rect x="250" y="100" width="150" height="100" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="10,5"/>
    <text x="260" y="90" font-family="monospace" font-size="14" fill="#60a5fa">Zoom In</text>
    
    <!-- Color gradient bar -->
    <rect x="50" y="400" width="40" height="120" fill="url(#gradient)"/>
    <rect x="50" y="400" width="40" height="20" fill="#1a1a1a" stroke="#4ade80"/>
    <rect x="50" y="420" width="40" height="20" fill="#2d2d2d" stroke="#60a5fa"/>
    <rect x="50" y="440" width="40" height="20" fill="#4a4a4a" stroke="#f472b6"/>
    <rect x="50" y="460" width="40" height="20" fill="#6a6a6a" stroke="#f97316"/>
    <rect x="50" y="480" width="40" height="20" fill="#8a8a8a" stroke="#4ade80"/>
    
    <text x="100" y="415" font-family="monospace" font-size="12" fill="#9ca3af">Low iterations</text>
    <text x="100" y="495" font-family="monospace" font-size="12" fill="#9ca3af">High iterations</text>
  </g>
  
  <!-- Controls legend -->
  <g transform="translate(60, 500)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" fill="#4ade80">Controls:</text>
    
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="monospace" font-size="16" fill="#60a5fa">Click</text>
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">- Zoom in 2x</text>
    </g>
    <g transform="translate(0, 50)">
      <text x="0" y="0" font-family="monospace" font-size="16" fill="#f472b6">+/-</text>
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">- Zoom controls</text>
    </g>
    <g transform="translate(0, 70)">
      <text x="0" y="0" font-family="monospace" font-size="16" fill="#f97316">h/j/k/l</text>
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">- Pan navigation</text>
    </g>
    <g transform="translate(0, 90)">
      <text x="0" y="0" font-family="monospace" font-size="16" fill="#4ade80">r</text>
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">- Reset view</text>
    </g>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f0f0f"/>
  
  <!-- GitHub badge -->
  <g transform="translate(60, 605)">
    <rect width="160" height="20" rx="3" fill="#2d2d2d"/>
    <text x="5" y="14" font-family="Arial, sans-serif" font-size="12" fill="#6e7681">
      github.com/andrewthecodertx
    </text>
  </g>
</svg>
